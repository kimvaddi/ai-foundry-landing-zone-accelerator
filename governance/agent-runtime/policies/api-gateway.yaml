# =============================================================================
# KLZ FinOps Accelerator — API Gateway (agent-runtime policy)
# =============================================================================
# Forked from:  microsoft/agent-governance-toolkit
#               agent-governance-python/agent-os/templates/policies/api-gateway.yaml
# Commit:       6f94b69f4c524f5c87227db0609e3d28deba7fb7
# Upstream:     MIT License (c) Microsoft Corporation
#
# KLZ deltas vs upstream:
#   * network.allowlist: REPLACED with KLZ-only egress targets
#     (APIM gateway FQDN + Azure Cognitive Services / OpenAI private endpoints).
#     Public api.openai.com / api.anthropic.com / etc REMOVED — those go via
#     APIM in KLZ. This is the shadow-AI prevention enforced in-agent
#     (defense-in-depth alongside Entra CA + Purview DLP from Phase C).
#   * url_validation.exceptions: REMOVED localhost:3000 (no localhost in baseline)
#   * tls.min_version: 1.2 -> 1.3 (KLZ security baseline)
#   * audit.log_path: relocated under ./logs/klz/
#
# Operator note: the APIM FQDN below is environment-specific. Override per
# environment in klz-baseline.yaml or via a downstream policy that includes
# this template.
# =============================================================================

kernel:
  version: "1.0"
  mode: strict
  template: api-gateway

description: |
  KLZ-customized policy for controlling external API access from agents.
  Default-deny network: agents can ONLY reach the KLZ APIM gateway and
  Azure-managed AI endpoints. All public AI provider URLs are denied —
  agents that need OpenAI/Anthropic/Gemini must route through APIM.

# ============================================
# Domain Allowlist (KLZ-specific — REPLACES upstream defaults)
# ============================================
network:
  allowlist:
    # KLZ APIM gateway — the ONLY blessed AI egress path.
    # NOTE: dev FQDN hard-coded for the dev ring; override in klz-baseline
    # for other environments.
    - apim-klzfin-dev-c6ej.azure-api.net

    # Azure-managed AI endpoints (reachable via private endpoint only).
    # Required when agents call Foundry SDK directly with private endpoint DNS.
    - "*.cognitiveservices.azure.com"
    - "*.openai.azure.com"

    # Azure Storage (for agent state / cost-tracking DB upload).
    # Restrict further via Azure NSG / Private Endpoint at the network layer.
    - "*.blob.core.windows.net"

  blocklist:
    # Public AI provider endpoints — agents must use APIM in KLZ.
    - api.openai.com
    - api.anthropic.com
    - generativelanguage.googleapis.com
    - api.groq.com
    - api.perplexity.ai

    # Tunneling / exfiltration vectors (kept from upstream)
    - '*.onion'
    - 'pastebin.com'
    - '*.ngrok.io'
    - '*.localtunnel.me'

  default_action: deny

# ============================================
# Request Policies
# ============================================
policies:
  - name: request_size_limit
    description: Limit request payload sizes
    type: size_limit
    max_request_body_bytes: 1048576       # 1MB
    max_response_body_bytes: 10485760     # 10MB
    action: SIGSTOP
    message: "Request/response size exceeds limit"

  - name: request_timeout
    description: Enforce request timeouts
    type: timeout
    connect_timeout_seconds: 10
    read_timeout_seconds: 60
    total_timeout_seconds: 120
    action: SIGKILL
    message: "Request timeout exceeded"

  - name: http_method_control
    description: Control allowed HTTP methods
    type: method_whitelist
    allowed_methods:
      - GET
      - POST
      - PUT
      - PATCH
    blocked_methods:
      - DELETE
    action: SIGSTOP
    message: "HTTP method requires approval"

  - name: header_validation
    description: Validate and sanitize headers
    type: header_check
    required_headers:
      - User-Agent
    blocked_headers:
      - X-Forwarded-For
      - X-Real-IP
    max_header_size_bytes: 8192
    action: SIGSTOP
    message: "Header validation failed"

  - name: url_validation
    description: Validate URL patterns (SSRF prevention)
    deny:
      - patterns:
          - '(?i)localhost'
          - '127\.0\.0\.1'
          - '0\.0\.0\.0'
          - '169\.254\.\d+\.\d+'
          - '10\.\d+\.\d+\.\d+'
          - '172\.(1[6-9]|2[0-9]|3[0-1])\.\d+\.\d+'
          - '192\.168\.\d+\.\d+'
          - 'file://'
          - 'gopher://'
    # KLZ: no localhost exceptions in baseline. Dev rigs that need localhost
    # must override locally and not commit the override.
    exceptions: []
    action: SIGKILL
    message: "URL validation failed - possible SSRF attempt"

  - name: response_validation
    description: Validate API responses for sensitive data leakage
    type: response_check
    block_if_contains:
      - '(?i)BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY'
      - '(?i)aws_secret_access_key'
      - '(?i)-----BEGIN CERTIFICATE-----'
    action: SIGKILL
    message: "Response contains sensitive data"

  - name: per_domain_rate_limit
    description: Rate limit by domain
    type: rate_limit
    limits:
      default:
        requests_per_minute: 60
      # APIM is the hot path — give it more headroom.
      "apim-klzfin-dev-c6ej.azure-api.net":
        requests_per_minute: 120
    action: SIGSTOP
    message: "Rate limit exceeded for domain"

  - name: credential_protection
    description: Prevent credential exposure in URLs
    type: credential_check
    deny:
      - patterns:
          - '(?i)(api[_-]?key|token|password|secret)=[^&]+'
    action: SIGKILL
    message: "Credentials detected in URL - use headers instead"

# ============================================
# TLS Configuration (KLZ: raised to 1.3)
# ============================================
tls:
  min_version: "1.3"
  verify_certificates: true
  allowed_cipher_suites:
    - TLS_AES_128_GCM_SHA256
    - TLS_AES_256_GCM_SHA384
    - TLS_CHACHA20_POLY1305_SHA256

# ============================================
# Retry Policy
# ============================================
retry:
  max_retries: 3
  retry_on_status:
    - 429
    - 502
    - 503
    - 504
  backoff:
    initial_delay_ms: 1000
    max_delay_ms: 30000
    multiplier: 2.0

# ============================================
# Caching
# ============================================
cache:
  enabled: true
  ttl_seconds: 300
  max_size_mb: 100
  cache_methods:
    - GET
  no_cache_patterns:
    - '/api/v1/realtime/'
    - '/stream/'

audit:
  enabled: true
  log_path: "./logs/klz/api-gateway-audit.log"
  include:
    - all_requests
    - blocked_requests
    - rate_limit_events
  retention_days: 30
