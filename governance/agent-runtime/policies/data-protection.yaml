# =============================================================================
# Data Protection Policy Template — KLZ FinOps Accelerator (Wave 2 fork)
# =============================================================================
# Detection-based PII / financial / PHI / credential / log-leak controls.
# Defense-in-depth layer designed to ride alongside klz-production.yaml
# (and any future klz-baseline.yaml override) via include:.
#
# Forked from microsoft/agent-governance-toolkit @ 6f94b69
#   agent-governance-python/agent-os/templates/policies/data-protection.yaml
# MIT-licensed. Customized for KLZ FinOps accelerator.
#
# KLZ deltas vs upstream:
#   * Audit export: log_path commented as override-only; centralized export
#       is the responsibility of enterprise.yaml (LAW + App Insights).
#   * Added KLZ-specific patterns:
#       - Azure subscription IDs in outputs (info-leakage signal)
#       - Azure storage account keys
#       - Azure SAS tokens
#       - Connection-string-style "AccountKey=" leaks
#   * compliance.frameworks: explicit GDPR + HIPAA + SOC2 alignment
#       (PCI-DSS opt-in via Wave 3 overlay).
#   * data_retention_warnings demoted from SIGSTOP to warn-only because KLZ
#       uses Redis with explicit TTLs everywhere — the upstream patterns
#       trigger false positives on every cache.set().
#       Re-enable in regulated overlays if needed.
# =============================================================================

kernel:
  version: "1.0"
  mode: strict
  template: data-protection

description: |
  KLZ data-protection layer. Detection-based controls for PII, financial
  data, PHI, credentials, log leakage, and Azure-specific secrets. Pairs
  with klz-production.yaml or any klz-baseline-derived composition via
  include:. Audit export is handled centrally by enterprise.yaml.

signals:
  enabled:
    - SIGSTOP   # Pause for human review
    - SIGKILL   # Terminate on critical violation

policies:
  # ============================================
  # PII Detection and Protection
  # ============================================
  - name: pii_detection
    description: Detect and block exposure of personally identifiable information.
    severity: critical
    scope: output
    deny:
      - patterns:
          # Social Security Numbers (US)
          - '\b\d{3}-\d{2}-\d{4}\b'
          - '\b\d{9}\b'

          # Credit Card Numbers (Visa / MasterCard / Amex / Discover)
          - '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'

          # Email addresses in sensitive contexts
          - '(?i)(email|e-mail)\s*[:=]\s*["'']?[\w.+-]+@[\w-]+\.[\w.-]+["'']?'

          # Phone numbers
          - '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'

          # Passport numbers
          - '(?i)passport\s*[:=]?\s*[A-Z0-9]{6,9}'

          # Driver's license
          - '(?i)driver.*license\s*[:=]?\s*[A-Z0-9]{5,15}'
    action: SIGKILL
    message: "PII detected in output — data must be masked or removed."

  # ============================================
  # Financial Data Protection
  # ============================================
  - name: financial_data_protection
    description: Protect financial information (account / routing / CVV).
    severity: critical
    deny:
      - patterns:
          - '(?i)(account|acct)\s*(?:number|#|no)?\s*[:=]?\s*\d{8,17}'
          - '(?i)routing\s*(?:number|#)?\s*[:=]?\s*\d{9}'
          - '(?i)(cvv|cvc|cv2)\s*[:=]?\s*\d{3,4}'
    action: SIGKILL
    message: "Financial data exposure blocked."

  # ============================================
  # Health Data Protection (HIPAA)
  # ============================================
  - name: health_data_protection
    description: Protect health-related information (HIPAA-aligned).
    severity: critical
    deny:
      - patterns:
          - '(?i)(mrn|medical\s*record)\s*[:=]?\s*[A-Z0-9]{6,12}'
          - '(?i)(insurance|member)\s*id\s*[:=]?\s*[A-Z0-9]{8,15}'
          - '(?i)diagnosis\s*[:=]?\s*[A-Z]\d{2}\.\d{1,2}'
    action: SIGKILL
    message: "Protected health information (PHI) detected."

  # ============================================
  # KLZ: Azure-specific secret detection
  # ============================================
  - name: klz_azure_secret_protection
    description: Block Azure subscription IDs, storage keys, SAS tokens, and connection strings in outputs.
    severity: critical
    category: security
    scope: [output]
    deny:
      - patterns:
          # Azure subscription IDs (UUID) — info-leakage, not a credential but
          # still flagged in prod outputs to a customer-facing surface.
          - '\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b'

          # Azure storage account keys (base64, 88 chars)
          - '(?i)(AccountKey|StorageKey)\s*=\s*[A-Za-z0-9+/]{86,88}=='

          # Azure SAS tokens
          - '(?i)\bsig=[A-Za-z0-9%]{20,}'
          - '(?i)\bsv=\d{4}-\d{2}-\d{2}&[A-Za-z0-9%&=_.+\-]+'

          # Generic connection-string leaks
          - '(?i)DefaultEndpointsProtocol=https;AccountName='
          - '(?i)Endpoint=sb://[^;]+;SharedAccessKey='
    action: SIGKILL
    message: "Azure secret or sensitive identifier detected in output — blocked."

  # ============================================
  # Logging Safety
  # ============================================
  - name: safe_logging
    description: Prevent sensitive data in logs.
    severity: high
    deny:
      - patterns:
          - '(?i)log.*password'
          - '(?i)console\.log.*password'
          - '(?i)print.*password'
          - '(?i)logger\..*password'
          - '(?i)log.*(?:token|api[_-]?key|secret)'
          - '(?i)console\.log.*(?:token|api[_-]?key)'
    action: SIGSTOP
    message: "Sensitive data should not be logged."

  # ============================================
  # Data Retention  (KLZ: warn-only — false-positive heavy on Redis usage)
  # ============================================
  - name: data_retention_warnings
    description: Warn about potential data retention issues. Demoted to low severity in KLZ.
    severity: low
    deny:
      - patterns:
          - '(?i)cache\.set\s*\([^)]*\)\s*[^,]*$'
          - '(?i)localStorage\.setItem'
          - '(?i)sessionStorage\.setItem'
    action: SIGSTOP
    message: "Consider data retention policies — add TTL or expiration."

  # ============================================
  # Data Export Controls
  # ============================================
  - name: data_export_controls
    description: Monitor bulk data export operations.
    severity: high
    deny:
      - patterns:
          - '(?i)SELECT\s+\*\s+FROM\s+\w+\s*;'
          - '(?i)pg_dump'
          - '(?i)mysqldump'
          - '(?i)mongodump'
    action: SIGSTOP
    message: "Bulk data export detected — ensure authorization."

  # ============================================
  # Encryption Requirements
  # ============================================
  - name: encryption_requirements
    description: Ensure sensitive data is encrypted at rest and in transit.
    severity: high
    deny:
      - patterns:
          - '(?i)(password|secret|key)\s*=\s*["''][^"'']+["'']'
          - '(?i)md5\s*\('
          - '(?i)sha1\s*\('
    action: SIGSTOP
    message: "Use strong encryption (AES-256, SHA-256+) for sensitive data."

  # ============================================
  # Third-Party Data Sharing
  # ============================================
  - name: third_party_sharing
    description: Monitor data sharing with third parties.
    severity: medium
    deny:
      - patterns:
          - '(?i)(fetch|axios|requests)\s*\.\s*(get|post)\s*\([^)]*user'
    action: SIGSTOP
    message: "Review third-party data sharing for compliance."

# ============================================
# Audit  (KLZ: relies on enterprise.yaml export destinations)
# ============================================
audit:
  enabled: true
  # log_path is OVERRIDE ONLY in KLZ; centralized export is handled by
  # enterprise.yaml -> Log Analytics (KlzAgentAudit_CL) + Application Insights.
  log_path: "${KLZ_DATA_PROTECTION_AUDIT_LOG_PATH:-./logs/data-protection-audit.log}"
  include:
    - all_violations
    - pii_detections
    - data_exports
  retention_days: 365

# ============================================
# Compliance framing  (KLZ: explicit framework alignment)
# ============================================
compliance:
  frameworks:
    - GDPR
    - CCPA
    - HIPAA
    - SOC2          # KLZ addition
    # PCI-DSS: opt-in via Wave 3 overlay (governance/agent-runtime/policies/pci-dss.yaml)
  data_classification:
    public: []
    internal: ["email", "name"]
    confidential: ["ssn", "credit_card", "health_data", "azure_subscription_id"]
    restricted: ["password", "encryption_key", "azure_storage_key", "sas_token"]
