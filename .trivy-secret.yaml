#============================================================================
# trivy secret-scanner configuration
#----------------------------------------------------------------------------
# Defines what counts as a hard-coded secret. We allow placeholder strings
# in *.sample.* files but reject real-looking secrets everywhere else.
#============================================================================

enable-builtin-rules:
  - aws-access-key-id
  - aws-secret-access-key
  - azure-storage-account-key
  - github-pat
  - private-key

# Allow obviously-placeholder strings used in sample param files.
allow-rules:
  - id: 'placeholder-strings'
    description: 'Sample param files use <REPLACE-WITH-...> placeholders'
    regex: '<REPLACE-WITH-[A-Z0-9_-]+>'
    path: '.*\.sample\.(bicepparam|tfvars)$'

  - id: 'dummy-credentials'
    description: 'CI/QA dummy passwords are flagged in plan logs only'
    regex: 'DummyP@ssw0rd[0-9]+!QA'
    path: '.*'

  - id: 'kim-test-sshkey'
    description: 'QA-only ssh-ed25519 public key committed for plan validation'
    regex: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIpwfee\+5R5OboUx7eifKqYKW/WvT6XjRW1x18NxcVvk qa@klz-finops'
    path: '.*'
